<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Coffee</title>

    <!--Stylesheets-->
        <!-- Normalize CSS Style-->
        <link rel="stylesheet" href="css/normalize.css">
        <!-- Original Style-->
        <link rel="stylesheet" href="css/style.css">
        <!--Google Fonts Pre Connection link -->
        <link rel="preconnect" href="https://fonts.gstatic.com">
        <!--Google Fonts: Open Sans 400 -->
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
        <!--Google Fonts: PT Sans 400-->
        <link href="https://fonts.googleapis.com/css2?family=PT+Sans&display=swap" rel="stylesheet">
        <!--Google Fonts: PT Sans 700-->
        <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="barr">
                <a class="logo" href="index.html">
                    <h1 class="logo__name no-margin center-text">About<span class="logo__bold">Coffee</span> </h1>
                </a>
                <nav class="navigation">
                    <a href="about_us.html" class="navigation__link">About Us</a>
                    <a href="courses.html" class="navigation__link">Courses</a>
                    <a href="contact.html" class="navigation__link">Contact</a>
                </nav>
            </div>
        </div>
        <div class="header__text">
            <h2 class="no-margin">Coffee Blog with tips and courses</h2>
            <p class="no-margin">Learn from experts with best tips and recipes</p>
        </div>
    </header>

    <main class="container">
        <h3 class="center-text">Contact</h3>
        <div class="contact__background"></div>
        <form class="form">
            <div class="field">
                <label class="field__label" for="name">Name</label>
                <input class="field__field"  type="text" placeholder="Your name" id="name">
            </div>
            <div class="field">  
                <label  class="field__label"  for="email">Email</label>
                <input class="field__field" type="email" placeholder="Your email" id="email">
            </div>
            <div class="field">
                <label class="field__label"  for="message">Mesage</label>
                <textarea  class="field__field field__field--textarea"  id="message" ></textarea>
            </div>
            <div class="field">
                <input type="submit" value="Enviar" class="button primary--button">
            </div>
        </form>
    </main>
    <footer class="footer no-margin no-padding">
        <div class="container">
            <div class="barr">
                <a class="logo" href="index.html">
                    <h1 class="logo__name no-margin center-text">About<span class="logo__bold">Coffee</span> </h1>
                </a>
                <nav class="navigation">
                    <a href="about_us.html" class="navigation__link">About Us</a>
                    <a href="courses.html" class="navigation__link">Courses</a>
                    <a href="contact.html" class="navigation__link">Contact</a>
                </nav>
            </div>
        </div>
    </footer>
</body>
</html>
